name: 🐛 Bug
description: Something is broken or not working as expected.
title: "[Bug] "
labels: ["type:bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of what's wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error messages, screenshots, or video if helpful.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS / device:
        - Browser / app version:
        - Build / commit:

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "P0 — Critical (production down, data loss)"
        - "P1 — High (major feature broken, no workaround)"
        - "P2 — Medium (broken but workaround exists)"
        - "P3 — Low (minor / cosmetic)"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Logs, related issues, hypotheses about root cause.
